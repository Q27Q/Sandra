<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei";
  background:#fff;
  color:#111;
}

/* 日期行 */
.header{
  display:grid;
  grid-template-columns:120px repeat(5,1fr);
  padding:12px 10px;
  font-size:12px;
  color:#666;
  border-bottom:1px solid #eee;
}

.header div:first-child{
  padding-left:8px;
}

/* 每行 */
.row{
  display:grid;
  grid-template-columns:120px repeat(5,1fr);
  align-items:center;
  padding:14px 10px;
  border-bottom:1px solid #f2f2f2;
}

/* 城市 */
.city{
  font-size:15px;
  font-weight:500;
  padding-left:8px;
}

/* cell */
.cell{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
}

/* SVG 图标 */
.icon{
  width:30px;
  height:30px;
}

/* 温度 */
.temp{
  font-size:13px;
  color:#777;
}

/* SVG统一样式 */
svg{
  width:30px;
  height:30px;
}
</style>
</head>

<body>

<div class="header" id="headerRow">
  <div></div>
</div>

<div class="row" id="zhuhai">
  <div class="city">珠海</div>
</div>

<div class="row" id="macau">
  <div class="city">澳门</div>
</div>

<div class="row" id="hongkong">
  <div class="city">香港</div>
</div>

<script>

/* 天气 SVG */
function svg(type){

  const icons = {

    sunny: `
<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="4" fill="#111"/>
<g stroke="#111" stroke-width="1.5">
<line x1="12" y1="1" x2="12" y2="4"/>
<line x1="12" y1="20" x2="12" y2="23"/>
<line x1="1" y1="12" x2="4" y2="12"/>
<line x1="20" y1="12" x2="23" y2="12"/>
</g>
</svg>`,

    cloud: `
<svg viewBox="0 0 24 24">
<path d="M7 18h10a4 4 0 0 0 0-8 5 5 0 0 0-9.7 1.5A3.5 3.5 0 0 0 7 18z"
fill="#111"/>
</svg>`,

    rain: `
<svg viewBox="0 0 24 24">
<path d="M6 14h12a4 4 0 0 0 0-8 5 5 0 0 0-10 1 3.5 3.5 0 0 0-2 7z"
fill="#111"/>
<line x1="8" y1="18" x2="8" y2="22" stroke="#111"/>
<line x1="12" y1="18" x2="12" y2="22" stroke="#111"/>
<line x1="16" y1="18" x2="16" y2="22" stroke="#111"/>
</svg>`,

    storm: `
<svg viewBox="0 0 24 24">
<path d="M6 14h12a4 4 0 0 0 0-8 5 5 0 0 0-10 1 3.5 3.5 0 0 0-2 7z"
fill="#111"/>
<path d="M12 14l-3 6h3l-1 4 4-6h-3z" fill="#111"/>
</svg>`
  };

  return icons[type] || icons.cloud;
}

/* weather code → icon */
function map(code){
  if(code===0) return "sunny";
  if(code<=3) return "cloud";
  if(code<=48) return "cloud";
  if(code<=67) return "rain";
  return "storm";
}

/* fetch */
function getWeather(lat,lon){
  return fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`
  ).then(r=>r.json());
}

/* header */
function renderHeader(dates){

  const el = document.getElementById("headerRow");

  for(let i=0;i<5;i++){
    const d = document.createElement("div");
    d.textContent = dates[i].slice(5);
    el.appendChild(d);
  }
}

/* row */
function renderRow(data,id){

  const el = document.getElementById(id);
  const d = data.daily;

  for(let i=0;i<5;i++){

    const cell = document.createElement("div");
    cell.className = "cell";

    cell.innerHTML = `
      ${svg(map(d.weathercode[i]))}
      <div class="temp">${Math.round(d.temperature_2m_min[i])}~${Math.round(d.temperature_2m_max[i])}</div>
    `;

    el.appendChild(cell);
  }

  return d.time;
}

/* init */
async function init(){

  const zh = await getWeather(22.27,113.57);
  const ma = await getWeather(22.20,113.54);
  const hk = await getWeather(22.32,114.17);

  const dates = renderRow(zh,"zhuhai");
  renderHeader(dates);

  renderRow(ma,"macau");
  renderRow(hk,"hongkong");
}

init();

</script>

</body>
</html>

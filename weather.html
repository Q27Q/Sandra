<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greater Bay Weather</title>

<style>
  body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei";
    background:#f5f6f8;
  }

  .wrap{
    display:flex;
    flex-direction:column;
    height:100vh;
  }

  .card{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:24px;
    border-bottom:1px solid #eee;
    background:white;
  }

  .city{
    font-size:14px;
    color:#888;
  }

  .temp{
    font-size:42px;
    font-weight:600;
    margin:8px 0;
  }

  .desc{
    font-size:14px;
    color:#666;
  }
</style>
</head>

<body>

<div class="wrap">

  <div class="card" id="zhuhai">
    <div class="city">ZHuhai</div>
    <div class="temp">--°</div>
    <div class="desc">loading...</div>
  </div>

  <div class="card" id="macau">
    <div class="city">Macau</div>
    <div class="temp">--°</div>
    <div class="desc">loading...</div>
  </div>

  <div class="card" id="hongkong">
    <div class="city">Hong Kong</div>
    <div class="temp">--°</div>
    <div class="desc">loading...</div>
  </div>

</div>

<script>
const API_KEY = "9381b37d869a7913f4b6c36e7cb742c9";

async function getWeather(city, elId){
  const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=zh_cn`;

  const res = await fetch(url);
  const data = await res.json();

  const el = document.getElementById(elId);
  el.querySelector(".temp").innerText = Math.round(data.main.temp) + "°";
  el.querySelector(".desc").innerText = data.weather[0].description;
}

getWeather("Zhuhai", "zhuhai");
getWeather("Macau", "macau");
getWeather("Hong Kong", "hongkong");

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBA Weather</title>

<style>
  body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei";
    background:#f5f6f8;
  }

  .wrap{
    height:100vh;
    display:flex;
    flex-direction:column;
  }

  .card{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:24px;
    background:white;
    border-bottom:1px solid #eee;
  }

  .city{
    font-size:14px;
    color:#888;
  }

  .row{
    display:flex;
    align-items:baseline;
    gap:12px;
    margin-top:8px;
  }

  .temp{
    font-size:44px;
    font-weight:600;
  }

  .desc{
    font-size:14px;
    color:#666;
  }
</style>
</head>

<body>

<div class="wrap">

  <div class="card">
    <div class="city">ZHuhai</div>
    <div class="row">
      <div class="temp" id="zhuhai-t">--</div>
      <div class="desc" id="zhuhai-d">loading...</div>
    </div>
  </div>

  <div class="card">
    <div class="city">Macau</div>
    <div class="row">
      <div class="temp" id="macau-t">--</div>
      <div class="desc" id="macau-d">loading...</div>
    </div>
  </div>

  <div class="card">
    <div class="city">Hong Kong</div>
    <div class="row">
      <div class="temp" id="hk-t">--</div>
      <div class="desc" id="hk-d">loading...</div>
    </div>
  </div>

</div>

<script>

const API_KEY = "9381b37d869a7913f4b6c36e7cb742c9";

async function load(city, tId, dId){
  const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=zh_cn`;

  const res = await fetch(url);
  const data = await res.json();

  document.getElementById(tId).innerText =
    Math.round(data.main.temp) + "°";

  document.getElementById(dId).innerText =
    data.weather[0].description;
}

load("Zhuhai", "zhuhai-t", "zhuhai-d");
load("Macau", "macau-t", "macau-d");
load("Hong Kong", "hk-t", "hk-d");

</script>

</body>
</html>

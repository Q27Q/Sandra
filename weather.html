<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBA 7-Day Weather</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei";
  background:#f5f6f8;
}

.wrap{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* 每个城市一整块 */
.city{
  flex:1;
  background:white;
  border-bottom:1px solid #eee;
  padding:14px;
  display:flex;
  flex-direction:column;
}

.title{
  font-size:14px;
  color:#888;
  margin-bottom:8px;
}

/* 7天横向滚动 */
.days{
  display:flex;
  gap:10px;
  overflow-x:auto;
  flex:1;
  align-items:center;
}

.day{
  min-width:80px;
  background:#f7f8fa;
  border-radius:12px;
  padding:10px;
  text-align:center;
  flex-shrink:0;
}

.temp{
  font-size:18px;
  font-weight:600;
}

.desc{
  font-size:12px;
  color:#666;
  margin-top:4px;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="city">
    <div class="title">Zhuhai</div>
    <div class="days" id="zhuhai"></div>
  </div>

  <div class="city">
    <div class="title">Macau</div>
    <div class="days" id="macau"></div>
  </div>

  <div class="city">
    <div class="title">Hong Kong</div>
    <div class="days" id="hongkong"></div>
  </div>

</div>

<script>

function getWeather(lat, lon){
  return fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`
  ).then(r => r.json());
}

/* 简单天气图标 */
function icon(code){
  if(code===0) return "☀️";
  if(code<=3) return "🌤";
  if(code<=48) return "☁️";
  if(code<=67) return "🌧";
  if(code<=77) return "🌨";
  return "⛈";
}

function render(elId, data){

  const el = document.getElementById(elId);

  const days = data.daily.time;

  for(let i=0;i<7;i++){

    const div = document.createElement("div");
    div.className = "day";

    div.innerHTML = `
      <div>${days[i].slice(5)}</div>
      <div class="temp">${Math.round(data.daily.temperature_2m_max[i])}°</div>
      <div class="desc">${icon(data.daily.weathercode[i])}</div>
    `;

    el.appendChild(div);
  }
}

async function load(){

  const zh = await getWeather(22.27,113.57);
  render("zhuhai", zh);

  const ma = await getWeather(22.20,113.54);
  render("macau", ma);

  const hk = await getWeather(22.32,114.17);
  render("hongkong", hk);
}

load();

</script>

</body>
</html>

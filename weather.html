<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Greater Bay Weather Widget</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: "#f6f7fb",
            card: "#ffffff",
            text: "#111827",
            sub: "#6b7280"
          }
        }
      }
    }
  </script>

  <style>
    html,body{
      margin:0;
      padding:0;
      background:#f6f7fb;
      font-family: Inter, "Microsoft YaHei", sans-serif;
    }

    .glass {
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>

<div class="min-h-screen flex flex-col gap-4 p-4">

  <!-- 珠海 -->
  <a href="https://forecast7.com/zh/22d27113d58/zhuhai/"
     class="bg-white rounded-xl shadow-sm hover:shadow-md transition p-4 flex flex-col gap-1">

    <div class="text-sm text-gray-500">ZHUHAI</div>
    <div class="text-lg font-semibold text-gray-900">珠海天气</div>
    <div class="text-xs text-gray-400">Greater Bay Area</div>

  </a>

  <!-- 澳门 -->
  <a href="https://forecast7.com/zh/22d20113d54/macau/"
     class="bg-white rounded-xl shadow-sm hover:shadow-md transition p-4 flex flex-col gap-1">

    <div class="text-sm text-gray-500">MACAU</div>
    <div class="text-lg font-semibold text-gray-900">澳门天气</div>
    <div class="text-xs text-gray-400">Greater Bay Area</div>

  </a>

  <!-- 香港 -->
  <a href="https://forecast7.com/zh/22d28114d16/hong-kong-island/"
     class="bg-white rounded-xl shadow-sm hover:shadow-md transition p-4 flex flex-col gap-1">

    <div class="text-sm text-gray-500">HONG KONG</div>
    <div class="text-lg font-semibold text-gray-900">香港天气</div>
    <div class="text-xs text-gray-400">Greater Bay Area</div>

  </a>

</div>

</body>
</html>
